<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm mới / Cập nhật Công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">📝 Tạo mới Công việc (Task)</h3>
            </div>
            <div class="card-body">

                <form th:action="@{${task.id == null ? '/tasks/create' : '/tasks/edit/' + task.id}}" th:object="${task}"
                    method="post">

                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Chủ đề (Subject) <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{subject}" id="subjectInput" class="form-control"
                            th:classappend="${#fields.hasErrors('subject')} ? 'is-invalid' : ''"
                            placeholder="Nhập tiêu đề công việc..." maxlength="255" required>

                        <div class="form-text text-end" id="charCount">0/255 ký tự</div>

                        <div class="invalid-feedback" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}">
                            Lỗi chủ đề
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả chi tiết</label>
                        <textarea class="form-control" th:field="*{description}" rows="3"
                            placeholder="Nhập nội dung chi tiết công việc..."></textarea>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Liên kết với (Related To)</label>
                            <select class="form-select" th:field="*{relatedToType}" id="relatedTypeSelect">
                                <option value="">-- Không liên kết --</option>
                                <option th:each="type : ${relatedTypes}" th:value="${type.name()}"
                                    th:text="${type.displayName}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mã đối tượng (Related ID)</label>
                            <select class="form-select" th:field="*{relatedToId}" id="relatedIdSelect" required>
                                <option th:if="${task.relatedToId != null}" th:value="${task.relatedToId}"
                                    th:text="${relatedName}" selected>
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ngày bắt đầu</label>
                            <input type="datetime-local" class="form-control" th:field="*{startDate}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Hạn chót (Due Date) <span
                                    class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" th:field="*{dueDate}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Mức độ ưu tiên</label>
                            <select class="form-select" th:field="*{priority}">
                                <option value="LOW">Thấp (Low)</option>
                                <option value="NORMAL">Bình thường (Normal)</option>
                                <option value="HIGH">Cao (High)</option>
                                <option value="URGENT">Khẩn cấp (Urgent)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="NOT_STARTED">Chưa bắt đầu</option>
                                <option value="IN_PROGRESS">Đang thực hiện</option>
                                <option value="WAITING">Đang chờ</option>
                                <option value="DEFERRED">Tạm hoãn</option>
                                <option value="COMPLETED">Đã hoàn thành</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Tiến độ (%)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{progressPercent}" min="0"
                                    max="100">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Người đảm nhiệm <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{assignedTo.id}" required>
                                <option value="">-- Chọn nhân viên --</option>
                                <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Khách hàng liên hệ</label>
                            <select class="form-select" th:field="*{contact.id}" id="contactSelect">
                                <option value="">-- Chọn khách hàng --</option>
                                <option th:each="c : ${contacts}" th:value="${c.id}" th:text="${c.fullName}"></option>
                            </select>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/tasks}" class="btn btn-secondary">Hủy bỏ</a>
                        <button type="submit" class="btn btn-success">💾 Lưu Công việc</button>
                    </div>

                </form>
            </div>
        </div>
    </div>


    <script>
        $(document).ready(function () {
            const typeSelect = $('#relatedTypeSelect');
            const idSelect = $('#relatedIdSelect');

            // Hàm khởi tạo bộ tìm kiếm
            function initSearchBox() {
                let selectedType = typeSelect.val();

                // Nếu người dùng chọn "-- Không liên kết --" thì khóa ô tìm kiếm lại
                if (!selectedType) {
                    idSelect.prop('disabled', true).empty();
                    return;
                }

                // Mở khóa ô tìm kiếm
                idSelect.prop('disabled', false);

                // Gắn Select2 vào ô ID
                idSelect.select2({
                    placeholder: '🔍 Gõ để tìm kiếm...',
                    allowClear: true,
                    ajax: {
                        url: '/api/search/related',
                        dataType: 'json',
                        delay: 300, // Đợi người dùng gõ xong 300ms mới gọi API (chống lag server)
                        data: function (params) {
                            return {
                                q: params.term, // Từ khóa người dùng gõ
                                type: typeSelect.val() // Gửi kèm loại (DEAL, CAMPAIGN...)
                            };
                        },
                        processResults: function (data) {
                            // Nhận dữ liệu JSON từ Controller và đưa vào danh sách
                            return { results: data };
                        }
                    }
                });
            }

            // Lắng nghe sự kiện: Bất cứ khi nào đổi "Loại liên kết", thì reset ô tìm kiếm
            typeSelect.on('change', function () {
                idSelect.empty(); // Xóa lịch sử chọn cũ
                initSearchBox();
            });

            // Chạy lần đầu tiên khi load trang
            initSearchBox();


            // Bắt sự kiện khi người dùng BẤM CHỌN một đối tượng trong ô Select2
            idSelect.on('select2:select', function (e) {
                let data = e.params.data; // Dữ liệu của đối tượng vừa chọn (id và text)
                let currentType = typeSelect.val(); // Loại liên kết đang chọn

                // Nếu đang chọn Công ty (CUSTOMER)
                if (currentType === 'CUSTOMER') {
                    let customerId = data.id; // Lấy ID của công ty

                    // Gọi API để lấy danh sách nhân viên của công ty đó
                    $.ajax({
                        url: '/api/search/contacts-by-customer',
                        type: 'GET',
                        data: { customerId: customerId },
                        success: function (response) {
                            let contactDropdown = $('#contactSelect');

                            // Xóa sạch danh sách cũ
                            contactDropdown.empty();
                            contactDropdown.append('<option value="">-- Chọn người liên hệ --</option>');

                            // Đổ danh sách mới vào
                            response.forEach(function (item) {
                                contactDropdown.append(new Option(item.text, item.id, false, false));
                            });

                            // (Tùy chọn) Nếu công ty đó chỉ có 1 nhân viên, tự động chọn luôn cho người dùng
                            if (response.length === 1) {
                                contactDropdown.val(response[0].id);
                            }
                        }
                    });
                }
            });

        });
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Lấy thời gian hiện tại của máy tính người dùng
            let now = new Date();

            // 2. Format về đúng chuẩn 'YYYY-MM-DDTHH:mm' của thẻ datetime-local
            let year = now.getFullYear();
            let month = (now.getMonth() + 1).toString().padStart(2, '0');
            let day = now.getDate().toString().padStart(2, '0');
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');

            let currentDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;

            // 3. Gán giá trị min cho các input (không cho chọn trước thời gian này)
            let startDateInput = document.getElementById('startDate');
            let dueDateInput = document.getElementById('dueDate');

            if (startDateInput) startDateInput.min = currentDateTime;
            if (dueDateInput) dueDateInput.min = currentDateTime;

            // (Tùy chọn thêm): Đảm bảo Hạn chót không được nhỏ hơn Ngày bắt đầu
            if (startDateInput && dueDateInput) {
                startDateInput.addEventListener('change', function () {
                    dueDateInput.min = this.value; // Hạn chót tối thiểu phải bằng Ngày bắt đầu
                });
            }
        });

        $(document).ready(function () {
            const subjectInput = $('#subjectInput');
            const charCount = $('#charCount');

            subjectInput.on('input', function () {
                let len = $(this).val().length;
                charCount.text(len + '/255 ký tự');

                if (len >= 255) {
                    charCount.addClass('text-danger').fontWeight('bold');
                } else {
                    charCount.removeClass('text-danger');
                }
            });
        });
        $(document).ready(function () {
            const subjectInput = $('#subjectInput');
            const charCount = $('#charCount');

            subjectInput.on('input', function () {
                let currentText = $(this).val();

                // [QUAN TRỌNG] Nếu text dài hơn 255, lập tức cắt bỏ phần thừa
                if (currentText.length > 255) {
                    currentText = currentText.substring(0, 255);
                    $(this).val(currentText); // Ghi đè lại vào ô input ngay lập tức
                }

                // Cập nhật bộ đếm (lúc này chắc chắn tối đa chỉ là 255)
                let len = currentText.length;
                charCount.text(len + '/255 ký tự');

                // Vì đã chặn cứng 255, ta chỉ cần đổi màu cảnh báo khi họ chạm mức giới hạn
                if (len === 255) {
                    charCount.addClass('text-danger fw-bold');
                } else {
                    charCount.removeClass('text-danger fw-bold');
                }
            });
        });
    </script>

</body>

</html>
