<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết Công việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .detail-label {
            color: #6c757d;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .detail-value {
            font-size: 1.05rem;
            margin-bottom: 1rem;
            color: #212529;
        }

        .desc-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0d6efd;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">⬅ Quay lại danh sách</a>
            <div>
                <button class="btn btn-warning"><a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                        class="btn btn-warning">✏️ Sửa</a></button>
                <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display: inline;"
                    onsubmit="return confirm('Bạn có chắc chắn muốn xóa vĩnh viễn công việc này không?');">
                    <button type="submit" class="btn btn-danger">🗑️ Xóa</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0" th:text="${task.subject}">Tên chủ đề công việc</h4>
            </div>

            <div class="card-body p-4">
                <div class="row">
                    <div class="col-md-8 border-end">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="detail-label">Liên quan đến</div>
                                <div class="detail-value text-primary fw-bold"
                                    th:text="${task.relatedObjectName ?: '-'}"></div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-label">Khách hàng liên hệ</div>
                                <div class="detail-value fw-bold" th:text="${task.contact?.fullName ?: '-'}"></div>
                            </div>
                        </div>

                        <hr>

                        <div class="detail-label mt-3">Mô tả chi tiết (Description)</div>
                        <div class="desc-box"
                            th:text="${task.description ?: 'Không có mô tả chi tiết cho công việc này.'}"></div>
                    </div>

                    <div class="col-md-4 ps-4">
                        <div class="detail-label">Trạng thái</div>
                        <div class="detail-value">
                            <span class="badge fs-6"
                                th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-warning text-dark'}"
                                th:text="${task.status.name()}">
                            </span>
                        </div>

                        <div class="detail-label">Mức độ ưu tiên</div>
                        <div class="detail-value">
                            <span class="badge bg-danger" th:if="${task.priority.name() == 'URGENT'}">Khẩn cấp</span>
                            <span class="badge bg-secondary" th:unless="${task.priority.name() == 'URGENT'}"
                                th:text="${task.priority.name()}"></span>
                        </div>

                        <div class="detail-label">Tiến độ</div>
                        <div class="progress mb-3" style="height: 20px;">
                            <div class="progress-bar" role="progressbar"
                                th:style="'width: ' + ${task.progressPercent} + '%;'"
                                th:text="${task.progressPercent} + '%'" th:aria-valuenow="${task.progressPercent}"
                                aria-valuemin="0" aria-valuemax="100">
                            </div>
                        </div>

                        <hr>

                        <div class="detail-label">Ngày bắt đầu</div>
                        <div class="detail-value"
                            th:text="${task.startDate != null ? #temporals.format(task.startDate, 'dd-MM-yyyy HH:mm') : '-'}">
                        </div>

                        <div class="detail-label text-danger">Hạn chót (Due Date)</div>
                        <div class="detail-value text-danger fw-bold"
                            th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'dd-MM-yyyy HH:mm') : '-'}">
                        </div>

                        <hr>

                        <div class="detail-label">Người được chỉ định (Assigned To)</div>
                        <div class="detail-value fw-bold" th:text="${task.assignedTo?.fullName ?: '-'}"></div>

                        <div class="detail-label">Người giao việc (Assigned By)</div>
                        <div class="detail-value text-muted" th:text="${task.assignedBy?.fullName ?: '-'}"></div>
                    </div>
                </div>
            </div>

            <div class="card-footer text-muted text-end" style="font-size: 0.85rem;">
                Tạo lúc: <span
                    th:text="${task.createdAt != null ? #temporals.format(task.createdAt, 'dd-MM-yyyy HH:mm:ss') : '-'}"></span>
                | Cập nhật lần cuối: <span
                    th:text="${task.updatedAt != null ? #temporals.format(task.updatedAt, 'dd-MM-yyyy HH:mm:ss') : '-'}"></span>
            </div>
        </div>
    </div>
</body>

</html>
